# Kubernetes Secrets Template
# Apply with: kubectl apply -f secrets.yaml -n fullstackarkham

apiVersion: v1
kind: Secret
metadata:
  name: database-credentials
  namespace: fullstackarkham
type: Opaque
stringData:
  host: "postgres.fullstackarkham.svc.cluster.local"
  username: "postgres"
  password: "CHANGE_ME_IN_PRODUCTION"
---
apiVersion: v1
kind: Secret
metadata:
  name: model-api-keys
  namespace: fullstackarkham
type: Opaque
stringData:
  anthropic: "sk-ant-CHANGE_ME"
  openai: "sk-CHANGE_ME"
  google: "AIza-CHANGE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: stripe-keys
  namespace: fullstackarkham
type: Opaque
stringData:
  secret-key: "sk_live_CHANGE_ME"
  webhook-secret: "whsec_CHANGE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: fullstackarkham
type: Opaque
stringData:
  secret: "CHANGE_ME_TO_SECURE_RANDOM_STRING"
