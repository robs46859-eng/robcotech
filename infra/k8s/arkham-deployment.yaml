# Arkham Security Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arkham
  namespace: fullstackarkham
  labels:
    app: arkham
    component: security
spec:
  replicas: 2
  selector:
    matchLabels:
      app: arkham
  template:
    metadata:
      labels:
        app: arkham
    spec:
      containers:
      - name: arkham
        image: fullstackarkham/arkham:latest
        ports:
        - containerPort: 8081
          name: http
        env:
        - name: DATABASE_HOST
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: host
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: username
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: password
        - name: REDIS_URL
          value: "redis://redis-master.fullstackarkham.svc.cluster.local:6379/0"
        - name: DECEPTION_ENABLED
          value: "true"
        - name: CROSS_TENANT_SHARE
          value: "true"
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: arkham
  namespace: fullstackarkham
spec:
  type: ClusterIP
  ports:
  - port: 8081
    targetPort: 8081
    protocol: TCP
    name: http
  selector:
    app: arkham
